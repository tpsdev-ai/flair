type Memory @table {
  id: ID @primaryKey
  agentId: String! @indexed
  content: String!
  visibility: String
  embedding: [Float] @indexed(type: "HNSW")
  tags: [String] @indexed
  durability: String @indexed
  source: String
  createdAt: String! @indexed
  updatedAt: String
  expiresAt: String @indexed
  retrievalCount: Int
  lastRetrieved: String
}

type Soul @table {
  id: ID @primaryKey
  agentId: String! @indexed
  key: String! @indexed
  value: String!
  durability: String @indexed
  createdAt: String!
  updatedAt: String
}

type MemoryGrant @table @export {
  id: ID @primaryKey
  ownerId: String!
  granteeId: String!
  scope: String!
  filter: String
  createdAt: String
}
