type WorkspaceState @table(database: "flair") @export {
  id: ID @primaryKey
  agentId: String! @indexed
  ref: String!
  label: String @indexed
  provider: String!
  timestamp: String! @indexed
  metadata: String
  taskId: String @indexed
  phase: String @indexed
  summary: String
  filesChanged: [String]
  createdAt: String!
  entities: [String] @indexed  # attention-plane vocabulary strings (flair#675); additive/nullable —
                               # existing rows carry no entities, readers tolerate absent (same
                               # pattern as Presence.activityUpdatedAt). See docs/entity-vocabulary.md.
}
