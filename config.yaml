# loadEnv MUST come first (Harper requirement): it loads the app-root `.env` so
# environment-driven config (e.g. FLAIR_ADMIN_AGENTS, and on Fabric the bootstrap
# secrets) is available to the rest of the component. NOTE: the native /mcp
# HARPER_CONFIG block is NOT delivered via loadEnv — loadEnv runs during component
# load, after Harper resolves config, so it lands too late to mount /mcp. That var
# is set as a real process env var instead (Fabric sources the `.env` pre-boot;
# local/launchd sets it directly). See src/cli.ts CONFIG MECHANISM note.
loadEnv:
  files: .env

name: flair
rest: true

## Port is configured via CLI (flair init --port) or HTTP_PORT env var.
## Omitted here to avoid conflicts with different deployment scenarios.
# http:
#   port: 19926

graphqlSchema:
  files: schemas/*.graphql

jsResource:
  files: dist/resources/*.js

'harper-fabric-embeddings':
  package: 'harper-fabric-embeddings'
  modelName: nomic-embed-text

authentication:
  # Default secure. Set to false for local development only.
  authorizeLocal: true
  enableSessions: true
