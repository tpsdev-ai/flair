name: flair
rest: true

## Port is configured via CLI (flair init --port) or HTTP_PORT env var.
## Omitted here to avoid conflicts with different deployment scenarios.
# http:
#   port: 19926

graphqlSchema:
  files: schemas/*.graphql

jsResource:
  files: dist/resources/*.js

'harper-fabric-embeddings':
  package: 'harper-fabric-embeddings'
  modelName: nomic-embed-text

authentication:
  # Default secure. Set to false for local development only.
  authorizeLocal: true
  enableSessions: true
