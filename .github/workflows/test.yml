name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - run: bun test test/unit/

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - name: Build Flair resources
        run: bun run build
      - name: Start Harper Pro with Flair component
        run: |
          docker run -d \
            --name harper-flair \
            -p 9925:9925 -p 9926:9926 \
            -v ${{ github.workspace }}:/flair \
            -e ROOTPATH=/tmp/harper-flair \
            -e HDB_ADMIN_USERNAME=admin \
            -e HDB_ADMIN_PASSWORD=admin123 \
            -e DEFAULTS_MODE=dev \
            -e NODE_HOSTNAME=localhost \
            -e OPERATIONSAPI_NETWORK_PORT=9925 \
            -e HTTP_PORT=9926 \
            --entrypoint /bin/sh \
            harperfast/harper-pro:5.0.0-alpha.3 \
            -c "harperdb install && harperdb dev /flair" 
      - name: Run integration tests against Docker Harper
        run: bun test test/integration/
        env:
          HARPER_HTTP_URL: http://localhost:9926
          HARPER_OPS_URL: http://localhost:9925
          HARPER_ADMIN_USER: admin
          HARPER_ADMIN_PASS: admin123

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit -p tsconfig.check.json

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - name: Run audit (advisory-only for transitive deps)
        run: bun audit || echo "::warning::Audit found vulnerabilities — all in harperdb transitive deps (unreleased v5 build)"
        continue-on-error: true

  sast-semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m pip install semgrep
      - run: >
          semgrep scan --config=auto --error
          --exclude='**/test/**' --exclude='**/dist/**'

  sast-codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
