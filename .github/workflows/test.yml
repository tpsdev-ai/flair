name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - run: bun test test/unit/

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun test test/integration/
    timeout-minutes: 5

  socket:
    name: Socket Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Socket Search
        uses: socketdev/socket-github-action@v1
        with:
          api-key: ${{ secrets.SOCKET_SECURITY_API_KEY }}
