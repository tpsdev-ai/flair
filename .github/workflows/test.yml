name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - run: bun test test/unit/

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      harper:
        image: harperfast/harper-pro:5.0.0-alpha.3
        ports:
          - 9925:9925
          - 9926:9926
        env:
          HDB_ADMIN_USERNAME: admin
          HDB_ADMIN_PASSWORD: admin123
          THREADS_COUNT: "1"
          NODE_HOSTNAME: localhost
        options: >-
          --health-cmd "wget -qO- http://localhost:9926/Health || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
          --health-start-period 15s
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - name: Run integration tests against Docker Harper
        run: bun test test/integration/
        env:
          HARPER_HTTP_URL: http://localhost:9926
          HARPER_OPS_URL: http://localhost:9925
          HARPER_ADMIN_USER: admin
          HARPER_ADMIN_PASS: admin123

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit -p tsconfig.check.json

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - name: Run audit (advisory-only for transitive deps)
        run: bun audit || echo "::warning::Audit found vulnerabilities — all in harperdb transitive deps (unreleased v5 build)"
        continue-on-error: true

  sast-semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m pip install semgrep
      - run: >
          semgrep scan --config=auto --error
          --exclude='**/test/**' --exclude='**/dist/**'

  sast-codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
