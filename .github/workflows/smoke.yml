name: Smoke Tests

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  smoke:
    name: Smoke Tests (Golden Path)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2
        with:
          bun-version: "1.3.10"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - uses: socketdev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2

        with:

          mode: firewall-free

      - name: Install (sfw — retry on intermittent Socket-firewall hang, ops-fumh)
        run: |
          for attempt in 1 2 3; do
            echo "::group::sfw bun install (attempt $attempt/3)"
            if timeout 300 sfw bun install --frozen-lockfile; then echo "::endgroup::"; exit 0; fi
            echo "::endgroup::"
            echo "sfw install attempt $attempt failed or timed out (5m) — the sfw hang is intermittent; retrying in 10s"
            sleep 10
          done
          echo "sfw bun install failed after 3 attempts"; exit 1

      - name: Install linux-x64 native binary for embeddings
        run: bun add --no-save @node-llama-cpp/linux-x64@3

      - name: Build Flair resources and CLI
        run: bun run build && bun run build:cli

      - name: Pre-download embedding model
        run: |
          mkdir -p models
          # HuggingFace intermittently 429s the model download; retry with
          # backoff (--retry-all-errors so 429/4xx are retried, not just 5xx).
          # A bare curl here flaked the whole job and blocked merges (#463, #465).
          curl -fSL --retry 5 --retry-delay 10 --retry-all-errors --connect-timeout 30 \
            "https://huggingface.co/nomic-ai/nomic-embed-text-v1.5-GGUF/resolve/main/nomic-embed-text-v1.5.Q4_K_M.gguf" \
            -o models/nomic-embed-text-v1.5.Q4_K_M.gguf
          echo "Model downloaded ($(du -sh models/*.gguf | cut -f1))"

      # Single source of truth (#625): derive the Harper Docker image tag from the
      # @harperfast/harper version declared in package.json, so the Docker-based
      # validation can never drift behind the Harper that ships to npm users (the
      # skew that bit v0.14.0: 5.0.1 image vs 5.1.14 dep).
      - name: Resolve Harper image tag from package.json
        id: harper-image
        run: |
          TAG=$(node -p "require('./package.json').dependencies['@harperfast/harper']")
          case "$TAG" in
            [0-9]*) : ;; # exact pin — usable directly as a Docker image tag
            *) echo "::error::@harperfast/harper is '$TAG' in package.json — not an exact version pin, cannot derive a Docker image tag"; exit 1 ;;
          esac
          echo "Harper Docker image tracks the npm dep: harperfast/harper:$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Start Flair (ephemeral Harper + Flair components)
        run: |
          docker run -d \
            --name harper-flair-smoke \
            -p 9925:9925 -p 9926:9926 \
            -v ${{ github.workspace }}:/flair \
            -e ROOTPATH=/tmp/harper-flair-smoke \
            -e HDB_ADMIN_USERNAME=admin \
            -e HDB_ADMIN_PASSWORD=admin123 \
            -e NODE_HOSTNAME=0.0.0.0 \
            -e OPERATIONSAPI_NETWORK_PORT=9925 \
            -e HTTP_PORT=9926 \
            --entrypoint /bin/sh \
            harperfast/harper:${{ steps.harper-image.outputs.tag }} \
            -c "harper install && harper dev /flair"

          # Wait for Harper to be healthy
          for i in $(seq 1 60); do
            if curl -sf http://localhost:9926/Health 2>/dev/null; then
              echo "Flair ready (${i}s)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Flair failed to start. Docker logs:"
              docker logs harper-flair-smoke 2>&1 || true
              exit 1
            fi
            sleep 1
          done

      - name: Run smoke tests
        env:
          FLAIR_TEST_URL: "http://localhost:9926"
          FLAIR_ADMIN_PASS: "admin123"
        run: bun test test/smoke/

      - name: Cleanup Docker
        if: always()
        run: |
          docker stop harper-flair-smoke 2>/dev/null || true
          docker rm harper-flair-smoke 2>/dev/null || true
