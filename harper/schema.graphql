type Agent @table @export {
  id: ID @primaryKey
  name: String!
  role: String
  publicKey: String!
  createdAt: String!
  updatedAt: String
}

type Integration @table @export {
  id: ID @primaryKey
  agentId: String! @indexed
  platform: String! @indexed
  username: String
  userId: String
  email: String
  encryptedCredential: String
  metadata: String
  createdAt: String!
  updatedAt: String
}

type Memory @table @export {
  id: ID @primaryKey
  agentId: String! @indexed
  content: String!
  embedding: [Float]
  tags: [String] @indexed
  durability: String @indexed
  source: String
  createdAt: String! @indexed
  updatedAt: String
  expiresAt: String @indexed
}

type Soul @table @export {
  id: ID @primaryKey
  agentId: String! @indexed
  key: String! @indexed
  value: String!
  durability: String @indexed
  createdAt: String!
  updatedAt: String
}
